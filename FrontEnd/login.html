<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sophie Bluel - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" type="text/css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap" rel="stylesheet" type="text/css">
	<link rel="stylesheet" href="./assets/style.css" type="text/css">
</head>
<body>
<header>
    <h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
    <nav>
        <ul>
            <li>projets</li>
            <li>contact</li>
            <li>login</li>
            <li><img src="./assets/icons/instagram.png" alt="Instagram"></li>
        </ul>
    </nav>
</header>
<main>
    <section id="login">
        <h2>Log in</h2>
        <form id="login-form">
            <label for="email">E-mail</label>
            <input type="email" id="email" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" required>

            <button type="submit">Se connecter</button>

            <p id="error-msg" style="display:none; color:red;">
                Identifiants incorrects.
            </p>
        </form>
        <a href="#" class="forgot-password">Mot de passe oublié</a>
    </section>
</main>
<footer>
    <nav>
        <ul>
            <li>Mentions Légales</li>
        </ul>
    </nav>
</footer>
<script src="./assets/login.js"></script>
</body>
</html>
